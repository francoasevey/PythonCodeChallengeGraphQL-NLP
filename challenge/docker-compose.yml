services:

  auth_service:
    build: ./auth_service
    container_name: auth_service
    ports:
      - "8002:8002"
    env_file:
      - .env
    networks:
      - challenge_net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  data_service:
    build: ./data_service
    container_name: data_service
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./data:/data:ro
    networks:
      - challenge_net
    restart: on-failure
    depends_on:
      auth_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  docs_service:
    build: ./docs_service
    container_name: docs_service
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - challenge_net
    restart: on-failure
    depends_on:
      auth_service:
        condition: service_healthy
      data_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  challenge_net:
    driver: bridge
